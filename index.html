<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Quizician</title>
<meta name="description" content="The Quizician — Who Said It.">
<style>
  :root{ --dark:#1A1224; --light:#FDFBF7; --accent:#C5A059; --emerald:#1B4332; }
  *{ box-sizing:border-box; margin:0; padding:0 }
  html,body{ height:100% }
  body{
    background:radial-gradient(120% 120% at 50% 0%, #241733 0%, var(--dark) 60%, #120c1a 100%);
    color:var(--light); font-family:Georgia, "Times New Roman", serif;
    min-height:100%; display:flex; align-items:center; justify-content:center; text-align:center;
    padding:32px; line-height:1.6;
  }
  .card{ max-width:640px }
  .crest{ font-size:14px; letter-spacing:8px; color:var(--accent); margin-bottom:26px }
  h1{ font-size:44px; letter-spacing:4px; font-weight:normal; margin-bottom:10px }
  .rule{ width:70px; height:2px; background:var(--accent); margin:22px auto; opacity:.8 }
  .tag{ font-size:19px; letter-spacing:2px; color:#e9e2d6 }
  .sub{ font-size:14px; letter-spacing:1px; color:#b9aec4; margin-top:22px }
  .foot{ position:fixed; bottom:20px; left:0; right:0; font-size:11px; letter-spacing:3px; color:#6f6480; font-family:ui-monospace,Menlo,monospace }
</style>
</head>
<body>
  <main class="card">
    <div class="crest">&#9670; THE QUIZICIAN &#9670;</div>
    <h1>Who Said It.</h1>
    <div class="rule"></div>
    <p class="tag">Provenance is a game. Play it well.</p>
    <p class="sub">An institution of attributed truth &mdash; arriving.</p>
  </main>
  <div class="foot">OPTICONIX &middot; TQ SOVEREIGN VESSEL</div>
</body>
</html>
